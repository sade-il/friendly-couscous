<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>Font Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;900&family=Assistant:wght@400;800&family=Frank+Ruhl+Libre:wght@500;700&family=Rubik:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#0e1a2b; color:#eee; font-family: Heebo, sans-serif; padding:40px; }
  .card { background: linear-gradient(180deg,#11233a,#0a1525); border:1px solid #1f3a5a; border-radius:14px; padding:28px 32px; margin-bottom:22px; }
  .label { color:#a98756; font-family: ui-monospace, monospace; font-size:12px; letter-spacing:.18em; margin-bottom:14px; }
  .line1 { font-family: Heebo, sans-serif; font-weight:900; font-size:64px; line-height:1; color:#e8e4d8; }
  .line1 .acc { color:#f97316; }
  .v { margin-top:10px; }
  .v1 { font-family: Heebo, sans-serif; font-weight:900; font-size:30px; letter-spacing:.32em; color:#dcd6c7; }
  .v2 { font-family: Assistant, sans-serif; font-weight:800; font-size:30px; letter-spacing:.10em; color:#dcd6c7; }
  .v3 { font-family: "Frank Ruhl Libre", serif; font-weight:700; font-size:34px; letter-spacing:.05em; color:#dcd6c7; }
  .v4 { font-family: Rubik, sans-serif; font-weight:500; font-size:28px; letter-spacing:.22em; color:#dcd6c7; }
  .acc { color:#f97316; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">VARIANT 1 · Heebo Black · letter-spacing .32em (הנוכחי)</div>
    <div class="line1">הנדסה שעומדת</div>
    <div class="v v1">מאחורי כל ק<span class="acc">ו</span></div>
  </div>
  <div class="card">
    <div class="label">VARIANT 2 · Assistant ExtraBold · צפוף ורחב</div>
    <div class="line1">הנדסה שעומדת</div>
    <div class="v v2">מאחורי כל ק<span class="acc">ו</span></div>
  </div>
  <div class="card">
    <div class="label">VARIANT 3 · Frank Ruhl Libre · סריף עדין</div>
    <div class="line1">הנדסה שעומדת</div>
    <div class="v v3">מאחורי כל ק<span class="acc">ו</span></div>
  </div>
  <div class="card">
    <div class="label">VARIANT 4 · Rubik Medium · מונו-ליין נקי</div>
    <div class="line1">הנדסה שעומדת</div>
    <div class="v v4">מאחורי כל ק<span class="acc">ו</span></div>
  </div>
</body>
</html>

name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch default branch ref for Copilot diffing
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch || '' }}"
          current_branch="$(git symbolic-ref --quiet --short HEAD || true)"
          base_ref="${GITHUB_BASE_REF:-}"
          head_ref="${GITHUB_HEAD_REF:-}"

          if [ -z "$default_branch" ]; then
            default_branch="$(git ls-remote --symref origin HEAD | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"
          fi

          if [ -f .git/shallow ]; then
            git fetch --no-tags --prune --unshallow origin
          fi

          refs=()
          if [ -n "$default_branch" ]; then
            refs+=("+refs/heads/${default_branch}:refs/remotes/origin/${default_branch}")
          fi
          if [ -n "$current_branch" ] && [ "$current_branch" != "$default_branch" ]; then
            refs+=("+refs/heads/${current_branch}:refs/remotes/origin/${current_branch}")
          fi
          if [ -n "$base_ref" ] && [ "$base_ref" != "$default_branch" ] && [ "$base_ref" != "$current_branch" ]; then
            refs+=("+refs/heads/${base_ref}:refs/remotes/origin/${base_ref}")
          fi
          if [ -n "$head_ref" ] && [ "$head_ref" != "$default_branch" ] && [ "$head_ref" != "$current_branch" ] && [ "$head_ref" != "$base_ref" ]; then
            refs+=("+refs/heads/${head_ref}:refs/remotes/origin/${head_ref}")
          fi
          if [ "${#refs[@]}" -gt 0 ]; then
            git fetch --no-tags --prune origin "${refs[@]}"
          fi
